name: Release

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:
jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Testes unitarios
        run: npm test    
      #PARTE 1 - Até aqui

      #PARTE 2 - A partir daqui (descomentar)
      - name: Checkout do código
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0 # Buscar tags

      - name: Instalar semver
        run: npm install -g semver

      - name: Criar nova tag caso não exista
        id: create_initial_tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$(git tag)" ]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git tag -a v0.0.0 -m "Initial release"
            git push origin v0.0.0
          fi

      - name: Calcular nova versão
        id: calculate_version
        run: |
          git fetch --tags
          # Pega a última tag ou define v0.0.0
          LAST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v0.0.0")
          echo "Versão Atual: $LAST_TAG"
          
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          fi
          
          MAJOR=0; MINOR=0; PATCH=0
          
          # Loop corrigido para ler linha por linha
          while read -r COMMIT; do
            if [[ "$COMMIT" == *"BREAKING CHANGE"* ]]; then MAJOR=1
            elif [[ "$COMMIT" == *"feat"* ]]; then MINOR=1
            elif [[ "$COMMIT" == *"fix"* ]]; then PATCH=1
            fi
          done <<< "$COMMITS"
          
          CURRENT_VERSION=${LAST_TAG#v}
          NEW_VERSION=$CURRENT_VERSION

          if [ $MAJOR -eq 1 ]; then NEW_VERSION=$(semver -i major $CURRENT_VERSION)
          elif [ $MINOR -eq 1 ]; then NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
          elif [ $PATCH -eq 1 ]; then NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
          fi
          
          echo "Nova versão calculada: $NEW_VERSION"
          
          # SALVANDO A VARIÁVEL
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

      - name: Atualizar versão no package.json
        # Aqui referenciamos o ID 'calculate_version' que definimos acima
        run: |
          npm version ${{ steps.calculate_version.outputs.new_version }} --no-git-tag-version
          
      - name: Commit e push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add package.json
          # Usando [skip ci] para evitar que esse commit dispare a pipeline de novo em loop
          git commit -m "chore(release): version ${{ env.new_version }} [skip ci]"
          git tag v${{ env.new_version }}
          git push origin main --tags